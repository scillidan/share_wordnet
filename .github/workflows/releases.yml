name: Create Releases

on:
  schedule:
    - cron: '0 0 1 * *'  # 00:00 on the 1st of every month (UTC)
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repositoryI
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zip

    - name: Install Python packages
      run: |
        pip install pyglossary lxml beautifulsoup4 python-idzip tqdm

    - name: Check latest WordNet version
      id: check_version
      run: |
        base_url="https://wordnetcode.princeton.edu/wn"
        version_pattern="^[0-9]+\.[0-9]+$" # Regex to match version format (e.g., 3.1)
        known_versions=("3.1" "3.0") # Add more versions as needed
        last_version_file="last_version.txt"
        if [[ -f $last_version_file ]]; then
          last_version=$(cat $last_version_file)
          echo "Last version: $last_version"
        else
          last_version=""
        fi
        latest_version=""
        for version in "${known_versions[@]}"; do
          download_url="${base_url}${version}.dict.tar.gz"
          echo "Checking: $download_url"
          if curl --head --silent --fail "$download_url" > /dev/null; then
            echo "Found valid version: $version"
            latest_version="$version"
          else
            echo "Version $version not found. Proceeding to next version."
          fi
        done
        if [[ "$latest_version" == "" ]]; then
          echo "No valid version found to download."
          exit 1
        fi
        if [[ "$latest_version" == "$last_version" ]]; then
          echo "No new version found, skipping download."
          echo "latest_version=$latest_version" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "New version detected: $latest_version. Downloading..."
        curl -LO "${base_url}${latest_version}.dict.tar.gz"
        echo "$latest_version" > $last_version_file
        echo "RELEASE_VERSION=$latest_version" >> $GITHUB_ENV
        echo "latest_version=$latest_version" >> $GITHUB_OUTPUT

    - name: Decompress archive
      env:
        version: ${{ steps.check_version.outputs.latest_version }}
      run: |
        mkdir wn${version}-dict
        tar -xzf "wn${version}.dict.tar.gz" -C wn${version}-dict --strip-components=1

    - name: Run pyglossary and related processing
      env:
        version: ${{ steps.check_version.outputs.latest_version }}
      run: |
        # stardict-original
        pyglossary ./wn${version}-dict ./wordnet-${version}-stardict-original --read-format=Wordnet --write-format=Stardict --name=WordNet
        # tabfile
        pyglossary ./wn${version}-dict ./_wordnet-${version}.txt --read-format=Wordnet --write-format=Tabfile
        # tabfile-formatted
        python text_format.py _wordnet-${version}.txt _wordnet-${version}-formatted.txt
        # stardict
        pyglossary ./_wordnet-${version}-formatted.txt ./wordnet-${version}-stardict --read-format=Tabfile --write-format=Stardict --name=WordNet
        # tabfile-formatted-html2ansi
        python html2ansi.py _wordnet-${version}-formatted.txt _wordnet-${version}-formatted-html2ansi.txt
        # sdcv
        pyglossary ./_wordnet-${version}-formatted-html2ansi.txt ./wordnet-${version}-sdcv --read-format=Tabfile --write-format=Stardict --name=WordNet
        # dictd
        pyglossary ./_wordnet-${version}-formatted-html2ansi.txt ./wordnet-${version}-dictd --read-format=Tabfile --write-format=DictOrg --write-options="dictzip=true" --name=WordNet
        # yomichan
        pyglossary ./_wordnet-${version}-formatted-html2ansi.txt ./wordnet-${version}-yomichan.zip --read-format=Tabfile --write-format=Yomichan --name=WordNet

    - name: Create zip files for Stardict sets
      run: |
        for base in *.ifo; do
          prefix="${base%.ifo}"
          if [[ ! -f "$prefix.ifo" ]]; then
            echo "Skipping $prefix, missing $prefix.ifo"
            continue
          fi
          if [[ ! -f "$prefix.idx" ]]; then
            echo "Skipping $prefix, missing $prefix.idx"
            continue
          fi
          dict_file=""
          if [[ -f "$prefix.dict.dz" ]]; then
            dict_file="$prefix.dict.dz"
          elif [[ -f "$prefix.dict" ]]; then
            dict_file="$prefix.dict"
          else
            echo "Skipping $prefix, missing $prefix.dict.dz or $prefix.dict"
            continue
          fi
          echo "Creating ${prefix}.zip from $prefix.ifo, $dict_file, $prefix.idx"
          zip -j "${prefix}.zip" "$prefix.ifo" "$dict_file" "$prefix.idx"
        done

    - name: Create zip files for Dictd sets
      env:
        version: ${{ steps.check_version.outputs.latest_version }}
      run: |
        zip -j "wordnet-${version}-dictd.zip" "wordnet-${version}-dictd.dict.dz" "wordnet-${version}-dictd.index"

    - name: Create a txt file with current commit SHA
      run: echo "${{ github.sha }}" > Release.txt

    - name: Configure Git for tag creation
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Create and push tag for release
      env:
        RELEASE_VERSION: ${{ steps.check_version.outputs.latest_version }}
      run: |
        git tag -f "$RELEASE_VERSION"
        git push origin "$RELEASE_VERSION" -f

    - name: Create GitHub Release and upload files
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      with:
        tag_name: ${{ steps.check_version.outputs.latest_version }}
        name: "${{ steps.check_version.outputs.latest_version }}"
        files: |
          _wordnet-*.txt
          wordnet-*.zip
          Release.txt
